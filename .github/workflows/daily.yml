name: Daily Rakuten ROOM Agent

on:
  schedule:
    # 07:00 JST = 22:00 UTC on the previous day.
    # User-facing schedule is daily at 07:00 JST.
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Select products and append to Google Sheets
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_REFERER: ${{ secrets.RAKUTEN_REFERER }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME: ${{ vars.SHEET_NAME || 'Sheet1' }}
          OUTPUT_SHEET_NAME: ${{ vars.OUTPUT_SHEET_NAME || '最新版_ROOM投稿_2026-06-19以降' }}
          GENERATION_MODE: fallback
          ENABLE_RELAXED_FALLBACK: ${{ vars.ENABLE_RELAXED_FALLBACK || 'true' }}
          STRICT_MIN_REVIEW_COUNT: ${{ vars.STRICT_MIN_REVIEW_COUNT || '100' }}
          STRICT_MIN_REVIEW_AVERAGE: ${{ vars.STRICT_MIN_REVIEW_AVERAGE || '4.3' }}
          STRICT_PRIORITY_TOTAL_SCORE: ${{ vars.STRICT_PRIORITY_TOTAL_SCORE || '70' }}
          STRICT_MIN_TOTAL_SCORE: ${{ vars.STRICT_MIN_TOTAL_SCORE || '60' }}
          RELAXED_MIN_REVIEW_COUNT: ${{ vars.RELAXED_MIN_REVIEW_COUNT || '30' }}
          RELAXED_MIN_REVIEW_AVERAGE: ${{ vars.RELAXED_MIN_REVIEW_AVERAGE || '4.0' }}
          RELAXED_MIN_TOTAL_SCORE: ${{ vars.RELAXED_MIN_TOTAL_SCORE || '40' }}
          DEBUG_MIN_REVIEW_COUNT: ${{ vars.DEBUG_MIN_REVIEW_COUNT || '0' }}
          DEBUG_MIN_REVIEW_AVERAGE: ${{ vars.DEBUG_MIN_REVIEW_AVERAGE || '0' }}
          DEBUG_MIN_TOTAL_SCORE: ${{ vars.DEBUG_MIN_TOTAL_SCORE || '0' }}
        run: python src/main.py

      - name: Upload generation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-generation-report
          path: reports/room_generation_report.*
          if-no-files-found: ignore
